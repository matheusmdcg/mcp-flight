# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: flights-mcp
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python flight_server.py
    envVars:
      - key: MCP_TRANSPORT
        value: sse
      - key: SERPAPI_KEY
        sync: false

  - type: web
    name: outros
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python outros.py
    envVars:
      - key: MCP_TRANSPORT
        value: sse
      - key: SERPAPI_KEY
        sync: false
